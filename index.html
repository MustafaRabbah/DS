<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c8f8f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MCQ Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef6f5;
      --bg-2: #dff0ef;
      --surface: #ffffff;
      --surface-2: #f4faf9;
      --border: #c5dddb;
      --text: #0d2624;
      --muted: #4a6b68;
      --accent: #0c8f8f;
      --accent-2: #0a7373;
      --accent-soft: rgba(12, 143, 143, 0.12);
      --accent-soft-2: rgba(12, 143, 143, 0.2);
      --ok: #0d7a4f;
      --ok-soft: rgba(13, 122, 79, 0.12);
      --bad: #c53030;
      --bad-soft: rgba(197, 48, 48, 0.1);
      --radius: 16px;
      --radius-sm: 12px;
      --touch: 48px;
      --font-en: "Outfit", system-ui, sans-serif;
      --font-ar: "Noto Sans Arabic", "Outfit", sans-serif;
      --shadow: 0 4px 24px rgba(13, 38, 36, 0.08);
      --shadow-card: 0 8px 32px rgba(13, 38, 36, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1514;
        --bg-2: #122320;
        --surface: #162a28;
        --surface-2: #1c3432;
        --border: #2a4542;
        --text: #e8f5f3;
        --muted: #8fb0ac;
        --accent: #3dd4c6;
        --accent-2: #5ee0d4;
        --accent-soft: rgba(61, 212, 198, 0.14);
        --accent-soft-2: rgba(61, 212, 198, 0.22);
        --ok: #4ade80;
        --ok-soft: rgba(74, 222, 128, 0.14);
        --bad: #f87171;
        --bad-soft: rgba(248, 113, 113, 0.14);
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: rgba(12, 143, 143, 0.15);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(165deg, var(--bg) 0%, var(--bg-2) 45%, var(--bg) 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--font-en);
      line-height: 1.55;
      padding:
        max(0.75rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1.25rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding-bottom: 0.5rem;
    }

    header {
      margin-bottom: 1rem;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.2rem, 4.5vw, 1.45rem);
      font-weight: 700;
      margin: 0 0 0.25rem;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    header .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0;
      font-weight: 500;
    }

    .credit {
      margin: 0.5rem 0 0;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .credit strong {
      color: var(--accent);
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    @media (min-width: 520px) {
      .toolbar {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
      }
    }

    .toolbar select {
      width: 100%;
      min-height: var(--touch);
      font-size: 1rem;
    }

    @media (min-width: 520px) {
      .toolbar select {
        width: auto;
        min-width: 11rem;
        flex: 1 1 auto;
      }
    }

    .seg-wrap {
      width: 100%;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .seg button {
      min-height: 44px;
      padding: 0.4rem 0.35rem;
      font-size: clamp(0.72rem, 2.8vw, 0.8rem);
      font-weight: 600;
      border: none;
      border-radius: 10px;
      margin: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .seg button.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 99px;
      transition: width 0.25s ease;
    }

    .progress {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      min-width: 5.5rem;
      text-align: end;
    }

    select,
    button:not(.opt) {
      font-family: inherit;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    @media (hover: hover) {
      select:hover,
      button:not(.opt):hover:not(:disabled) {
        border-color: var(--accent);
      }
    }

    button:not(.opt):active:not(:disabled) {
      transform: scale(0.98);
    }

    button:not(.opt):disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.1rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow-card);
    }

    @media (min-width: 480px) {
      .card {
        padding: 1.35rem 1.35rem;
      }
    }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-2);
      background: var(--accent-soft);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 0.85rem;
    }

    .q-block {
      margin-bottom: 1rem;
    }

    .q-block .label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.35rem;
    }

    .q-block p {
      margin: 0;
      font-size: clamp(1rem, 3.5vw, 1.08rem);
      font-weight: 500;
    }

    .q-block.ar {
      direction: rtl;
      font-family: var(--font-ar);
      text-align: right;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .opt {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      text-align: left;
      width: 100%;
      min-height: var(--touch);
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: inherit;
      font-size: clamp(0.95rem, 3.2vw, 1rem);
      font-weight: 500;
      cursor: pointer;
      line-height: 1.45;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .opt .letter {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent);
    }

    @media (hover: hover) {
      .opt:hover:not(:disabled) {
        border-color: var(--accent);
      }
    }

    .opt:active:not(:disabled) {
      transform: scale(0.99);
    }

    .opt.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 3px var(--accent-soft-2);
    }

    .opt.correct {
      border-color: var(--ok);
      background: var(--ok-soft);
    }

    .opt.correct .letter {
      background: var(--ok-soft);
      border-color: var(--ok);
      color: var(--ok);
    }

    .opt.wrong {
      border-color: var(--bad);
      background: var(--bad-soft);
    }

    .opt.wrong .letter {
      color: var(--bad);
      border-color: var(--bad);
    }

    .opt.ar {
      direction: rtl;
      font-family: var(--font-ar);
      text-align: right;
      flex-direction: row-reverse;
    }

    .opt .txt {
      flex: 1;
      min-width: 0;
      padding-top: 0.12rem;
    }

    .biling .ar-line {
      display: block;
      font-family: var(--font-ar);
    }

    .biling .en-line {
      display: block;
      font-size: 0.86em;
      color: var(--muted);
      margin-top: 0.45em;
      font-weight: 400;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .reveal-wrap {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border);
    }

    .reveal-wrap.hidden {
      display: none;
    }

    .answer-line {
      font-size: 0.95rem;
      margin-bottom: 0.55rem;
      font-weight: 500;
    }

    .answer-line strong {
      color: var(--ok);
    }

    .explain {
      font-size: 0.92rem;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }

    .explain:last-child {
      margin-bottom: 0;
    }

    .explain.ar {
      direction: rtl;
      font-family: var(--font-ar);
      text-align: right;
      color: var(--text);
      opacity: 0.92;
    }

    .nav-row {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .nav-row button {
      min-height: var(--touch);
      font-weight: 600;
      font-size: 0.88rem;
    }

    #toggleAns {
      font-size: 0.82rem;
    }

    @media (min-width: 400px) {
      .nav-row button,
      #toggleAns {
        font-size: 0.9rem;
      }
    }

    .site-footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .site-footer .credit-footer {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 500;
    }

    .site-footer .credit-footer strong {
      color: var(--accent);
      font-weight: 700;
    }

    .hint-tap {
      font-size: 0.72rem;
      color: var(--muted);
      margin: 0.35rem 0 0;
      opacity: 0.85;
    }

    .err {
      color: var(--bad);
      font-size: 0.9rem;
      padding: 1rem;
      background: var(--bad-soft);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="pageTitle">MCQ Practice</h1>
      <p class="sub" id="pageSub"></p>
      <p class="credit" id="creditHead">By <strong>Mustafa Rabbah</strong></p>
      <p class="hint-tap" data-ui="hintTap" hidden></p>
    </header>

    <div id="loadErr" class="err" hidden></div>

    <div id="app" hidden>
      <div class="toolbar">
        <label>
          <span class="visually-hidden" data-ui="categoryLabel">Category</span>
          <select id="category" aria-label="Filter by category"></select>
        </label>
        <div class="seg-wrap">
          <div class="seg" role="group" aria-label="Display language">
            <button type="button" data-mode="both" class="active" data-ui="modeBoth">EN + عربي</button>
            <button type="button" data-mode="en" data-ui="modeEn">English</button>
            <button type="button" data-mode="ar" data-ui="modeAr">العربية</button>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-bar" aria-hidden="true"><span id="progressFill"></span></div>
          <span class="progress" id="progress"></span>
        </div>
      </div>

      <article class="card" id="card"></article>

      <div class="nav-row">
        <button type="button" id="prev" data-ui="prev">← Previous</button>
        <button type="button" id="toggleAns" data-ui="showAnswer">Show answer</button>
        <button type="button" id="next" data-ui="next">Next →</button>
      </div>
    </div>

    <footer class="site-footer">
      <p class="credit-footer" id="creditFoot">By <strong>Mustafa Rabbah</strong></p>
    </footer>
  </div>

  <script>
    const UI_STR = {
      en: {
        categoryLabel: "Category",
        allCategories: "All categories",
        modeBoth: "EN + عربي",
        modeEn: "English",
        modeAr: "العربية",
        prev: "← Prev",
        next: "Next →",
        showAnswer: "Answer",
        hideAnswer: "Hide",
        correctPrefix: "Correct:",
        progress: (i, n) => `${i} / ${n}`,
        loadErr: "Could not load mcqs.json. For local preview, serve this folder (e.g. python -m http.server).",
        hintTap: "Double-tap the title for Arabic / English menus",
        credit: "By ",
        creditName: "Mustafa Rabbah",
      },
      ar: {
        categoryLabel: "التصنيف",
        allCategories: "كل الأقسام",
        modeBoth: "إنجليزي + عربي",
        modeEn: "English",
        modeAr: "العربية",
        prev: "→ السابق",
        next: "التالي ←",
        showAnswer: "الإجابة",
        hideAnswer: "إخفاء",
        correctPrefix: "الصحيح:",
        progress: (i, n) => `${i} من ${n}`,
        loadErr: "تعذر تحميل mcqs.json. للمعاينة محليًا شغّل خادمًا ثابتًا (مثل python -m http.server).",
        hintTap: "اضغط عنوان الصفحة مرتين للتبديل بين لغة القوائم",
        credit: "بواسطة ",
        creditName: "مصطفى رباح",
      },
    };

    let uiLang = "en";
    let displayMode = "both";
    let data = null;
    let filtered = [];
    let index = 0;
    let selectedLetter = null;
    let showAnswer = false;

    function t(key) {
      const table = UI_STR[uiLang];
      const v = table[key];
      if (typeof v === "function") return v;
      return v ?? UI_STR.en[key];
    }

    function setCreditLines() {
      const nameEn = UI_STR.en.creditName;
      const head = document.getElementById("creditHead");
      const foot = document.getElementById("creditFoot");
      if (uiLang === "ar") {
        head.innerHTML = `${escapeHtml(t("credit"))}<strong dir="rtl">${escapeHtml(UI_STR.ar.creditName)}</strong>`;
        foot.innerHTML = `${escapeHtml(t("credit"))}<strong dir="rtl">${escapeHtml(UI_STR.ar.creditName)}</strong>`;
      } else {
        head.innerHTML = `${escapeHtml(t("credit"))}<strong>${escapeHtml(nameEn)}</strong>`;
        foot.innerHTML = `${escapeHtml(t("credit"))}<strong>${escapeHtml(nameEn)}</strong>`;
      }
    }

    function applyUiStrings() {
      document.querySelectorAll("[data-ui]").forEach((el) => {
        const key = el.getAttribute("data-ui");
        if (key === "categoryLabel") return;
        const val = UI_STR.en[key] ? (uiLang === "ar" && UI_STR.ar[key] ? UI_STR.ar[key] : UI_STR.en[key]) : null;
        if (val) el.textContent = val;
      });
      const hint = document.querySelector("[data-ui=\"hintTap\"]");
      if (hint) {
        hint.textContent = t("hintTap");
        hint.hidden = false;
      }
      const cat = document.getElementById("category");
      if (cat.options.length && cat.options[0]) {
        cat.options[0].text = t("allCategories");
      }
      setCreditLines();
      updateProgressText();
      updateProgressBar();
      updateToggleAnswerBtn();
    }

    function stripDash(s) {
      return (s || "").replace(/^-\s+/, "").trim();
    }

    function setMode(mode) {
      displayMode = mode;
      document.querySelectorAll(".seg button").forEach((b) => {
        b.classList.toggle("active", b.getAttribute("data-mode") === mode);
      });
      renderCard();
    }

    function setUiLang(lang) {
      uiLang = lang;
      document.documentElement.lang = lang === "ar" ? "ar" : "en";
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      applyUiStrings();
      renderCard();
    }

    function categories(list) {
      const s = new Set();
      list.forEach((q) => s.add(q.category));
      return [...s].sort();
    }

    function applyFilter() {
      const cat = document.getElementById("category").value;
      filtered = cat ? data.questions.filter((q) => q.category === cat) : [...data.questions];
      index = Math.min(index, Math.max(0, filtered.length - 1));
      renderCard();
      updateProgressText();
      updateProgressBar();
    }

    function updateProgressText() {
      const el = document.getElementById("progress");
      if (!filtered.length) {
        el.textContent = "";
        return;
      }
      const fn = UI_STR[uiLang].progress || UI_STR.en.progress;
      el.textContent = fn(index + 1, filtered.length);
    }

    function updateProgressBar() {
      const fill = document.getElementById("progressFill");
      if (!filtered.length) {
        fill.style.width = "0%";
        return;
      }
      const pct = ((index + 1) / filtered.length) * 100;
      fill.style.width = `${pct}%`;
    }

    function updateToggleAnswerBtn() {
      const btn = document.getElementById("toggleAns");
      btn.textContent = showAnswer ? t("hideAnswer") : t("showAnswer");
    }

    function renderCard() {
      const card = document.getElementById("card");
      if (!filtered.length) {
        card.innerHTML = "<p>No questions.</p>";
        return;
      }
      const q = filtered[index];
      const showEn = displayMode !== "ar";
      const showAr = displayMode !== "en" && q.question_ar;

      let html = `<div class="badge">${escapeHtml(q.category)}</div>`;

      if (showEn) {
        html += `<div class="q-block"><div class="label">English</div><p>${escapeHtml(q.question)}</p></div>`;
      }
      if (showAr && q.question_ar) {
        html += `<div class="q-block ar"><div class="label">العربية</div><p>${escapeHtml(stripDash(q.question_ar))}</p></div>`;
      } else if (displayMode === "ar" && !q.question_ar) {
        html += `<div class="q-block ar"><div class="label">العربية</div><p>${escapeHtml(q.question)}</p></div>`;
      }

      html += `<div class="options">`;
      q.options.forEach((opt) => {
        const isSel = selectedLetter === opt.letter;
        let cls = "opt";
        if (displayMode === "ar") cls += " ar";
        if (isSel) cls += " selected";
        if (showAnswer) {
          if (opt.letter === q.correct_letter) cls += " correct";
          else if (isSel) cls += " wrong";
        }

        let labelHtml;
        if (displayMode === "en") {
          labelHtml = escapeHtml(opt.text);
        } else if (displayMode === "ar") {
          const txt = opt.text_ar ? stripDash(opt.text_ar) : opt.text;
          labelHtml = escapeHtml(txt);
        } else {
          if (opt.text_ar) {
            labelHtml =
              `<span class="biling">` +
              `<span dir="rtl" class="ar-line">${escapeHtml(stripDash(opt.text_ar))}</span>` +
              `<span dir="ltr" class="en-line">${escapeHtml(opt.text)}</span>` +
              `</span>`;
          } else {
            labelHtml = escapeHtml(opt.text);
          }
        }

        html += `<button type="button" class="${cls}" data-letter="${opt.letter}" ${showAnswer ? "disabled" : ""}>
          <span class="letter">${opt.letter}</span>
          <span class="txt">${labelHtml}</span>
        </button>`;
      });
      html += `</div>`;

      html += `<div class="reveal-wrap ${showAnswer ? "" : "hidden"}" id="reveal">`;
      const corrEn = q.correct_text;
      const corrAr = q.correct_text_ar ? stripDash(q.correct_text_ar) : "";

      if (displayMode === "both" && corrAr) {
        html += `<div class="answer-line"><strong>${escapeHtml(UI_STR.en.correctPrefix)}</strong> ${escapeHtml(corrEn)}</div>`;
        html += `<div class="answer-line ar" dir="rtl" style="font-family:var(--font-ar)"><strong>الصحيح:</strong> ${escapeHtml(corrAr)}</div>`;
      } else if (displayMode === "ar" && corrAr) {
        html += `<div class="answer-line ar" dir="rtl" style="font-family:var(--font-ar)"><strong>الصحيح:</strong> ${escapeHtml(corrAr)}</div>`;
      } else {
        html += `<div class="answer-line"><strong>${escapeHtml(t("correctPrefix"))}</strong> ${escapeHtml(corrEn)}</div>`;
      }

      const exEn = q.explanation;
      const exAr = q.explanation_ar ? stripDash(q.explanation_ar) : "";

      if (displayMode === "en") {
        html += `<p class="explain">${escapeHtml(exEn)}</p>`;
      } else if (displayMode === "ar") {
        if (exAr) html += `<p class="explain ar">${escapeHtml(exAr)}</p>`;
        else html += `<p class="explain ar">${escapeHtml(exEn)}</p>`;
      } else {
        html += `<p class="explain">${escapeHtml(exEn)}</p>`;
        if (exAr) html += `<p class="explain ar">${escapeHtml(exAr)}</p>`;
      }
      html += `</div>`;

      card.innerHTML = html;

      card.querySelectorAll(".opt:not([disabled])").forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedLetter = btn.getAttribute("data-letter");
          renderCard();
        });
      });
    }

    function escapeHtml(s) {
      if (!s) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function initCategories() {
      const sel = document.getElementById("category");
      sel.innerHTML = "";
      const all = document.createElement("option");
      all.value = "";
      all.textContent = t("allCategories");
      sel.appendChild(all);
      categories(data.questions).forEach((c) => {
        const o = document.createElement("option");
        o.value = c;
        o.textContent = c;
        sel.appendChild(o);
      });
    }

    async function main() {
      try {
        const res = await fetch("mcqs.json", { cache: "no-store" });
        if (!res.ok) throw new Error(String(res.status));
        data = await res.json();
      } catch (e) {
        document.getElementById("loadErr").hidden = false;
        document.getElementById("loadErr").textContent = t("loadErr");
        setCreditLines();
        return;
      }

      document.getElementById("pageTitle").textContent = data.title || "MCQ Practice";
      document.getElementById("pageSub").textContent = `${data.questions.length} questions`;

      initCategories();
      filtered = [...data.questions];
      document.getElementById("app").hidden = false;

      document.getElementById("category").addEventListener("change", () => {
        index = 0;
        selectedLetter = null;
        showAnswer = false;
        applyFilter();
        updateToggleAnswerBtn();
      });

      document.querySelectorAll(".seg button").forEach((b) => {
        b.addEventListener("click", () => setMode(b.getAttribute("data-mode")));
      });

      document.getElementById("prev").addEventListener("click", () => {
        if (index > 0) {
          index--;
          selectedLetter = null;
          showAnswer = false;
          renderCard();
          updateToggleAnswerBtn();
          updateProgressText();
          updateProgressBar();
        }
      });

      document.getElementById("next").addEventListener("click", () => {
        if (index < filtered.length - 1) {
          index++;
          selectedLetter = null;
          showAnswer = false;
          renderCard();
          updateToggleAnswerBtn();
          updateProgressText();
          updateProgressBar();
        }
      });

      document.getElementById("toggleAns").addEventListener("click", () => {
        showAnswer = !showAnswer;
        updateToggleAnswerBtn();
        renderCard();
      });

      document.querySelector("header h1").addEventListener("dblclick", () => {
        setUiLang(uiLang === "en" ? "ar" : "en");
      });

      applyUiStrings();
      renderCard();
      updateProgressText();
      updateProgressBar();
      updateToggleAnswerBtn();
    }

    main();
  </script>
</body>
</html>
