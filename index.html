<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MCQ Examination</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #7dd3fc;
      --ok: #4ade80;
      --ok-bg: rgba(74, 222, 128, 0.12);
      --bad: #f87171;
      --bad-bg: rgba(248, 113, 113, 0.1);
      --warn: #fbbf24;
      --radius: 10px;
      --touch: 48px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Arabic", "Helvetica Neue", sans-serif;
      --mono: ui-monospace, "Cascadia Code", Menlo, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      padding:
        max(0.5rem, env(safe-area-inset-top))
        max(0.75rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom))
        max(0.75rem, env(safe-area-inset-left));
    }

    .wrap {
      max-width: 36rem;
      margin: 0 auto;
    }

    .row-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem 1rem;
      padding: 0.65rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.6rem;
    }

    .row-top .meta {
      flex: 1 1 8rem;
      min-width: 0;
    }

    .row-top .tag {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.15rem;
    }

    .row-top .hint {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .timer {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      color: var(--warn);
      padding: 0.35rem 0.55rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .q-line {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0 0 0.5rem;
      padding: 0 0.1rem;
    }

    .q-line strong {
      color: var(--accent-2);
    }

    header {
      text-align: center;
      margin-bottom: 0.65rem;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0 0 0.15rem;
      color: var(--text);
    }

    header .sub {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .credit {
      margin: 0.25rem 0 0;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .credit strong { color: var(--accent); }

    .hint-tap {
      font-size: 0.68rem;
      color: var(--muted);
      margin: 0.25rem 0 0;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    @media (min-width: 480px) {
      .toolbar { flex-flow: row wrap; align-items: center; }
    }

    select {
      width: 100%;
      min-height: var(--touch);
      padding: 0 0.65rem;
      font: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    @media (min-width: 480px) {
      select {
        flex: 1 1 11rem;
        width: auto;
      }
    }

    .seg {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .seg button {
      flex: 1;
      min-height: 42px;
      padding: 0.25rem 0.2rem;
      font: inherit;
      font-size: clamp(0.68rem, 2.5vw, 0.76rem);
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .seg button.active {
      background: var(--surface-2);
      color: var(--text);
    }

    .progress {
      width: 100%;
      height: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress > i {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: 99px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--touch);
      padding: 0 0.75rem;
      font: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .btn-primary {
      background: #0284c7;
      border-color: #0369a1;
      color: #fff;
    }

    .btn-danger {
      background: #b91c1c;
      border-color: #991b1b;
      color: #fff;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 0.9rem;
      margin-bottom: 0.6rem;
    }

    @media (min-width: 400px) {
      .card { padding: 1.1rem 1rem; }
    }

    .q-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }

    .badge {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: rgba(56, 189, 248, 0.12);
      padding: 0.3rem 0.55rem;
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 999px;
    }

    .q-num {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--warn);
      padding: 0.2rem 0.45rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
    }

    .q-head { contain: content; }

    .q-block { margin-bottom: 0.85rem; }

    .q-block .label {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .q-block p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.48;
    }

    .q-block.ar {
      direction: rtl;
      text-align: right;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .opt {
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
      width: 100%;
      min-height: var(--touch);
      padding: 0.65rem 0.85rem;
      text-align: left;
      font: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .opt .letter {
      flex-shrink: 0;
      width: 1.85rem;
      height: 1.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent-2);
    }

    .opt.selected {
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
    }

    .opt.correct {
      border-color: var(--ok);
      background: var(--ok-bg);
    }

    .opt.correct .letter {
      color: var(--ok);
      border-color: var(--ok);
    }

    .opt.wrong {
      border-color: var(--bad);
      background: var(--bad-bg);
    }

    .opt.wrong .letter {
      color: var(--bad);
      border-color: var(--bad);
    }

    .opt.ar {
      direction: rtl;
      flex-direction: row-reverse;
      text-align: right;
    }

    .opt .txt { flex: 1; min-width: 0; }

    .biling .ar-line { display: block; }
    .biling .en-line {
      display: block;
      font-size: 0.85em;
      color: var(--muted);
      margin-top: 0.35em;
    }

    .reveal-wrap {
      margin-top: 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .reveal-wrap.hidden { display: none; }

    .answer-line {
      font-size: 0.88rem;
      margin-bottom: 0.45rem;
    }

    .answer-line strong { color: var(--ok); }

    .explain {
      margin: 0 0 0.5rem;
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .explain:last-child { margin-bottom: 0; }

    .explain.ar {
      direction: rtl;
      text-align: right;
      color: var(--text);
    }

    .nav-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem;
    }

    .nav-row #toggleAns { grid-column: 1 / -1; }

    .nav-row .btn { min-height: 46px; }

    .exam-actions {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.55rem;
    }

    @media (min-width: 420px) {
      .exam-actions { flex-direction: row; }
      .exam-actions .btn { flex: 1; }
    }

    footer {
      margin-top: 1.25rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .credit-footer {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .credit-footer strong { color: var(--accent); }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .err {
      padding: 0.85rem;
      background: var(--bad-bg);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: var(--radius);
      color: #fecaca;
      font-size: 0.88rem;
      margin-bottom: 0.75rem;
    }

    .modal-back {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.88);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.12s ease, visibility 0.12s;
    }

    .modal-back.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 100%;
      max-width: 22rem;
      padding: 1.25rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .modal h2 {
      margin: 0 0 0.35rem;
      font-size: 1.1rem;
      color: var(--text);
    }

    .modal .stat {
      font-family: var(--mono);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--warn);
      margin: 0.5rem 0;
      text-align: center;
    }

    .modal .detail {
      margin: 0 0 1rem;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .modal .btn-row .btn { width: 100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row-top" id="examBar" hidden>
      <div class="meta">
        <span class="tag" data-ui="examTag">Exam</span>
        <p class="hint" data-ui="examSub">One answer per question. Timer runs until you reset.</p>
      </div>
      <div class="timer" id="timer" aria-live="polite">00:00</div>
    </div>

    <p class="q-line" id="qCount" hidden></p>

    <header>
      <h1 id="pageTitle">MCQ Examination</h1>
      <p class="sub" id="pageSub"></p>
      <p class="credit" id="creditHead">By <strong>Mustafa Rabbah</strong></p>
      <p class="hint-tap" data-ui="hintTap" hidden></p>
    </header>

    <div id="loadErr" class="err" hidden></div>

    <div id="app" hidden>
      <div class="toolbar">
        <label>
          <span class="visually-hidden" data-ui="categoryLabel">Category</span>
          <select id="category" aria-label="Filter by category"></select>
        </label>
        <div class="seg" role="group" aria-label="Display language">
          <button type="button" data-mode="both" class="active" data-ui="modeBoth">EN + عربي</button>
          <button type="button" data-mode="en" data-ui="modeEn">English</button>
          <button type="button" data-mode="ar" data-ui="modeAr">العربية</button>
        </div>
        <div class="progress" aria-hidden="true"><i id="progressFill"></i></div>
      </div>

      <article class="card" id="card"></article>

      <div class="nav-row">
        <button type="button" class="btn" id="prev" data-ui="prev">← Prev</button>
        <button type="button" class="btn" id="next" data-ui="next">Next →</button>
        <button type="button" class="btn btn-primary" id="toggleAns" data-ui="showAnswer">Key</button>
      </div>

      <div class="exam-actions">
        <button type="button" class="btn btn-primary" id="finishExam" data-ui="finishExam">Results</button>
        <button type="button" class="btn btn-danger" id="resetExam" data-ui="resetExam">Reset</button>
      </div>
    </div>

    <footer>
      <p class="credit-footer" id="creditFoot">By <strong>Mustafa Rabbah</strong></p>
    </footer>
  </div>

  <div class="modal-back" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="resultTitle" hidden>
    <div class="modal">
      <h2 id="resultTitle" data-ui="resultsTitle">Results</h2>
      <p class="stat" id="resultScore">—</p>
      <p class="detail" id="resultDetail"></p>
      <div class="btn-row">
        <button type="button" class="btn btn-primary" id="closeModal" data-ui="closeResults">OK</button>
      </div>
    </div>
  </div>

  <script>
    const UI_STR = {
      en: {
        categoryLabel: "Category",
        allCategories: "All sections",
        modeBoth: "EN + عربي",
        modeEn: "English",
        modeAr: "العربية",
        prev: "← Prev",
        next: "Next →",
        showAnswer: "Show key",
        hideAnswer: "Hide",
        correctPrefix: "Correct:",
        examTag: "Timed exam",
        examSub: "Pick an answer on each screen. Use Results when done.",
        finishExam: "Results",
        resetExam: "Reset",
        resultsTitle: "Exam results",
        closeResults: "Continue",
        resultsLine: (c, t) => `Score: ${c} / ${t} (${t ? Math.round((c / t) * 100) : 0}%).`,
        resultsUnanswered: (n) => n > 0 ? ` Unanswered: ${n}.` : "",
        hintTap: "Double-tap title: English / العربية menus",
        credit: "By ",
        creditName: "Mustafa Rabbah",
        loadErr: "Could not load mcqs.json. Use a local server (python -m http.server).",
      },
      ar: {
        categoryLabel: "التصنيف",
        allCategories: "كل الأقسام",
        modeBoth: "إنجليزي + عربي",
        modeEn: "English",
        modeAr: "العربية",
        prev: "→ السابق",
        next: "التالي ←",
        showAnswer: "المفتاح",
        hideAnswer: "إخفاء",
        correctPrefix: "الصحيح:",
        examTag: "امتحان",
        examSub: "اختر إجابة في كل شاشة. النتيجة من زر النتيجة.",
        finishExam: "النتيجة",
        resetExam: "إعادة",
        resultsTitle: "النتيجة",
        closeResults: "متابعة",
        resultsLine: (c, t) => `${c} / ${t} (${t ? Math.round((c / t) * 100) : 0}٪).`,
        resultsUnanswered: (n) => n > 0 ? ` بدون إجابة: ${n}.` : "",
        hintTap: "اضغط العنوان مرتين للقوائم",
        credit: "بواسطة ",
        creditName: "مصطفى رباح",
        loadErr: "تعذر تحميل mcqs.json.",
      },
    };

    let uiLang = "en";
    let displayMode = "both";
    let data = null;
    let filtered = [];
    let index = 0;
    let selectedLetter = null;
    let showAnswer = false;
    const userAnswers = Object.create(null);
    let timerId = null;
    let examStart = 0;

    function t(key) {
      const v = UI_STR[uiLang][key];
      if (typeof v === "function") return v;
      return v ?? UI_STR.en[key];
    }

    function setCreditLines() {
      const head = document.getElementById("creditHead");
      const foot = document.getElementById("creditFoot");
      if (uiLang === "ar") {
        head.innerHTML = `${escapeHtml(t("credit"))}<strong dir="rtl">${escapeHtml(UI_STR.ar.creditName)}</strong>`;
        foot.innerHTML = `${escapeHtml(t("credit"))}<strong dir="rtl">${escapeHtml(UI_STR.ar.creditName)}</strong>`;
      } else {
        head.innerHTML = `${escapeHtml(t("credit"))}<strong>${escapeHtml(UI_STR.en.creditName)}</strong>`;
        foot.innerHTML = `${escapeHtml(t("credit"))}<strong>${escapeHtml(UI_STR.en.creditName)}</strong>`;
      }
    }

    function applyUiStrings() {
      document.querySelectorAll("[data-ui]").forEach((el) => {
        const key = el.getAttribute("data-ui");
        if (key === "categoryLabel") return;
        const enVal = UI_STR.en[key];
        if (typeof enVal === "function") return;
        const val = enVal != null ? (uiLang === "ar" && UI_STR.ar[key] != null ? UI_STR.ar[key] : enVal) : null;
        if (val != null && typeof val !== "function") el.textContent = val;
      });
      const hint = document.querySelector("[data-ui=\"hintTap\"]");
      if (hint) {
        hint.textContent = t("hintTap");
        hint.hidden = false;
      }
      const cat = document.getElementById("category");
      if (cat && cat.options[0]) cat.options[0].text = t("allCategories");
      setCreditLines();
      updateQCount();
      updateProgressBar();
      updateToggleAnswerBtn();
    }

    function stripDash(s) {
      return (s || "").replace(/^-\s+/, "").trim();
    }

    function currentQ() {
      return filtered[index];
    }

    function syncSelectionFromStore() {
      const q = currentQ();
      selectedLetter = q && userAnswers[q.id] != null ? userAnswers[q.id] : null;
    }

    function startTimer() {
      if (timerId) clearInterval(timerId);
      examStart = Date.now();
      const el = document.getElementById("timer");
      function tick() {
        const sec = Math.floor((Date.now() - examStart) / 1000);
        el.textContent = `${String(Math.floor(sec / 60)).padStart(2, "0")}:${String(sec % 60).padStart(2, "0")}`;
      }
      tick();
      timerId = setInterval(tick, 1000);
    }

    function setMode(mode) {
      displayMode = mode;
      document.querySelectorAll(".seg button").forEach((b) => {
        b.classList.toggle("active", b.getAttribute("data-mode") === mode);
      });
      renderCard();
    }

    function setUiLang(lang) {
      uiLang = lang;
      document.documentElement.lang = lang === "ar" ? "ar" : "en";
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      applyUiStrings();
      if (data) {
        document.getElementById("pageSub").textContent =
          (uiLang === "ar" ? `${data.questions.length} سؤال` : `${data.questions.length} questions`) +
          (uiLang === "ar" ? " · امتحان" : " · exam");
      }
      renderCard();
    }

    function categories(list) {
      const s = new Set();
      list.forEach((q) => s.add(q.category));
      return [...s].sort();
    }

    function clearAnswers() {
      for (const k of Object.keys(userAnswers)) delete userAnswers[k];
    }

    function applyFilter() {
      const cat = document.getElementById("category").value;
      filtered = cat ? data.questions.filter((q) => q.category === cat) : [...data.questions];
      index = Math.min(index, Math.max(0, filtered.length - 1));
      clearAnswers();
      showAnswer = false;
      syncSelectionFromStore();
      renderCard();
      updateQCount();
      updateProgressBar();
      updateToggleAnswerBtn();
      startTimer();
    }

    function updateQCount() {
      const el = document.getElementById("qCount");
      if (!filtered.length) {
        el.hidden = true;
        el.textContent = "";
        return;
      }
      el.hidden = false;
      const q = currentQ();
      if (uiLang === "ar") {
        el.innerHTML = `السؤال <strong>${index + 1}</strong> / <strong>${filtered.length}</strong>${q ? ` · ${escapeHtml(q.category)}` : ""}`;
      } else {
        el.innerHTML = `Question <strong>${index + 1}</strong> / <strong>${filtered.length}</strong>${q ? ` · ${escapeHtml(q.category)}` : ""}`;
      }
    }

    function updateProgressBar() {
      const fill = document.getElementById("progressFill");
      if (!filtered.length) {
        fill.style.width = "0%";
        return;
      }
      fill.style.width = `${((index + 1) / filtered.length) * 100}%`;
    }

    function updateToggleAnswerBtn() {
      const btn = document.getElementById("toggleAns");
      btn.textContent = showAnswer ? t("hideAnswer") : t("showAnswer");
    }

    function renderCard() {
      const card = document.getElementById("card");
      if (!filtered.length) {
        card.innerHTML = "<p>No questions.</p>";
        return;
      }
      syncSelectionFromStore();
      const q = filtered[index];
      const showEn = displayMode !== "ar";
      const showAr = displayMode !== "en" && q.question_ar;

      let html = `<div class="q-head"><span class="badge">${escapeHtml(q.category)}</span><span class="q-num">#${q.id}</span></div>`;

      if (showEn) {
        html += `<div class="q-block"><div class="label">English</div><p>${escapeHtml(q.question)}</p></div>`;
      }
      if (showAr && q.question_ar) {
        html += `<div class="q-block ar"><div class="label">العربية</div><p>${escapeHtml(stripDash(q.question_ar))}</p></div>`;
      } else if (displayMode === "ar" && !q.question_ar) {
        html += `<div class="q-block ar"><div class="label">العربية</div><p>${escapeHtml(q.question)}</p></div>`;
      }

      html += `<div class="options">`;
      q.options.forEach((opt) => {
        const isSel = selectedLetter === opt.letter;
        let cls = "opt";
        if (displayMode === "ar") cls += " ar";
        if (isSel) cls += " selected";
        if (showAnswer) {
          if (opt.letter === q.correct_letter) cls += " correct";
          else if (isSel) cls += " wrong";
        }

        let labelHtml;
        if (displayMode === "en") {
          labelHtml = escapeHtml(opt.text);
        } else if (displayMode === "ar") {
          labelHtml = escapeHtml(opt.text_ar ? stripDash(opt.text_ar) : opt.text);
        } else if (opt.text_ar) {
          labelHtml =
            `<span class="biling">` +
            `<span dir="rtl" class="ar-line">${escapeHtml(stripDash(opt.text_ar))}</span>` +
            `<span dir="ltr" class="en-line">${escapeHtml(opt.text)}</span>` +
            `</span>`;
        } else {
          labelHtml = escapeHtml(opt.text);
        }

        const dis = showAnswer ? " disabled" : "";
        html += `<button type="button" class="${cls}" data-letter="${opt.letter}"${dis}>` +
          `<span class="letter">${opt.letter}</span><span class="txt">${labelHtml}</span></button>`;
      });
      html += `</div>`;

      html += `<div class="reveal-wrap ${showAnswer ? "" : "hidden"}">`;
      const corrEn = q.correct_text;
      const corrAr = q.correct_text_ar ? stripDash(q.correct_text_ar) : "";

      if (displayMode === "both" && corrAr) {
        html += `<div class="answer-line"><strong>${escapeHtml(UI_STR.en.correctPrefix)}</strong> ${escapeHtml(corrEn)}</div>`;
        html += `<div class="answer-line ar" dir="rtl"><strong>الصحيح:</strong> ${escapeHtml(corrAr)}</div>`;
      } else if (displayMode === "ar" && corrAr) {
        html += `<div class="answer-line ar" dir="rtl"><strong>الصحيح:</strong> ${escapeHtml(corrAr)}</div>`;
      } else {
        html += `<div class="answer-line"><strong>${escapeHtml(t("correctPrefix"))}</strong> ${escapeHtml(corrEn)}</div>`;
      }

      const exEn = q.explanation;
      const exAr = q.explanation_ar ? stripDash(q.explanation_ar) : "";

      if (displayMode === "en") {
        html += `<p class="explain">${escapeHtml(exEn)}</p>`;
      } else if (displayMode === "ar") {
        html += `<p class="explain ar">${escapeHtml(exAr || exEn)}</p>`;
      } else {
        html += `<p class="explain">${escapeHtml(exEn)}</p>`;
        if (exAr) html += `<p class="explain ar">${escapeHtml(exAr)}</p>`;
      }
      html += `</div>`;

      card.innerHTML = html;
    }

    function cardClick(e) {
      if (showAnswer) return;
      const btn = e.target.closest("button.opt");
      if (!btn || btn.disabled) return;
      const q = currentQ();
      if (!q) return;
      const letter = btn.getAttribute("data-letter");
      selectedLetter = letter;
      userAnswers[q.id] = letter;
      renderCard();
    }

    function escapeHtml(s) {
      if (!s) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function initCategories() {
      const sel = document.getElementById("category");
      sel.innerHTML = "";
      const all = document.createElement("option");
      all.value = "";
      all.textContent = t("allCategories");
      sel.appendChild(all);
      categories(data.questions).forEach((c) => {
        const o = document.createElement("option");
        o.value = c;
        o.textContent = c;
        sel.appendChild(o);
      });
    }

    function computeResults() {
      let correct = 0;
      let unanswered = 0;
      filtered.forEach((q) => {
        const a = userAnswers[q.id];
        if (a == null || a === "") unanswered++;
        if (a === q.correct_letter) correct++;
      });
      return { correct, unanswered, total: filtered.length };
    }

    function openResultsModal() {
      const { correct, unanswered, total } = computeResults();
      document.getElementById("resultScore").textContent = `${correct} / ${total}`;
      const lineFn = UI_STR[uiLang].resultsLine || UI_STR.en.resultsLine;
      const unFn = UI_STR[uiLang].resultsUnanswered || UI_STR.en.resultsUnanswered;
      document.getElementById("resultDetail").textContent = lineFn(correct, total) + unFn(unanswered);
      document.getElementById("resultTitle").textContent = t("resultsTitle");
      document.getElementById("closeModal").textContent = t("closeResults");
      const modal = document.getElementById("resultModal");
      modal.hidden = false;
      requestAnimationFrame(() => modal.classList.add("open"));
    }

    function closeResultsModal() {
      const modal = document.getElementById("resultModal");
      modal.classList.remove("open");
      setTimeout(() => { modal.hidden = true; }, 120);
    }

    async function main() {
      const card = document.getElementById("card");
      card.addEventListener("click", cardClick);

      try {
        const res = await fetch("mcqs.json", { cache: "no-store" });
        if (!res.ok) throw new Error(String(res.status));
        data = await res.json();
      } catch (e) {
        document.getElementById("loadErr").hidden = false;
        document.getElementById("loadErr").textContent = t("loadErr");
        setCreditLines();
        return;
      }

      document.getElementById("pageTitle").textContent = data.title || "MCQ";
      document.getElementById("pageSub").textContent =
        `${data.questions.length} questions · exam`;

      initCategories();
      filtered = [...data.questions];
      document.getElementById("app").hidden = false;
      document.getElementById("examBar").hidden = false;

      document.getElementById("category").addEventListener("change", () => {
        index = 0;
        showAnswer = false;
        applyFilter();
      });

      document.querySelectorAll(".seg button").forEach((b) => {
        b.addEventListener("click", () => setMode(b.getAttribute("data-mode")));
      });

      document.getElementById("prev").addEventListener("click", () => {
        if (index > 0) {
          index--;
          showAnswer = false;
          renderCard();
          updateToggleAnswerBtn();
          updateQCount();
          updateProgressBar();
        }
      });

      document.getElementById("next").addEventListener("click", () => {
        if (index < filtered.length - 1) {
          index++;
          showAnswer = false;
          renderCard();
          updateToggleAnswerBtn();
          updateQCount();
          updateProgressBar();
        }
      });

      document.getElementById("toggleAns").addEventListener("click", () => {
        showAnswer = !showAnswer;
        updateToggleAnswerBtn();
        renderCard();
      });

      document.getElementById("finishExam").addEventListener("click", openResultsModal);

      document.getElementById("resetExam").addEventListener("click", () => {
        clearAnswers();
        index = 0;
        showAnswer = false;
        renderCard();
        updateToggleAnswerBtn();
        updateQCount();
        updateProgressBar();
        startTimer();
      });

      document.getElementById("closeModal").addEventListener("click", closeResultsModal);

      document.getElementById("resultModal").addEventListener("click", (e) => {
        if (e.target.id === "resultModal") closeResultsModal();
      });

      document.querySelector("header h1").addEventListener("dblclick", () => {
        setUiLang(uiLang === "en" ? "ar" : "en");
      });

      applyUiStrings();
      renderCard();
      updateQCount();
      updateProgressBar();
      updateToggleAnswerBtn();
      startTimer();
    }

    main();
  </script>
</body>
</html>
